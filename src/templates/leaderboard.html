<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class ="page">
    <h1>Leaderboard</h1>

    {% if scores %}
        <table>
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody>
                {% for username, score in scores %}
                    <tr>
                        <td>{{ loop.index }}</td>
                        <td>{{ username }}</td>
                        <td>{{ score }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p>No scores yet.</p>
    {% endif %}

    <a href="/game">Play again</a>
    <a href="/dashboard">Dashboard</a>
</body>
</html>
